    <script>
        // GitHub Pages has no server rewrites, so app deep-link paths
        // (/scan/..., /share/bus/...) are served by this 404 page. Forward
        // them to their landing pages with the original path preserved in
        // ?link= so the app-open button there can carry the scanned token.
        (function () {
            var path = window.location.pathname;
            var page = '';
            if (path === '/scan' || path.indexOf('/scan/') === 0) page = '/scan.html';
            else if (path === '/share/bus' || path.indexOf('/share/bus/') === 0) page = '/share-bus.html';
            if (page) window.location.replace(page + '?link=' + encodeURIComponent(path));
        })();
    </script>

        .hero-inner {
            position: relative;
            z-index: 2;
            max-width: 720px;
            margin: 0 auto;
        }

        .section-tag {
            background: rgba(255, 255, 255, 0.2);
            color: var(--white);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: inline-block;
            margin-bottom: 20px;
        }

        .code-404 {
            display: flex;
            justify-content: center;
            gap: 0.02em;
            font-weight: 800;
            font-size: clamp(5.5rem, 22vw, 9.5rem);
            color: var(--white);
            text-shadow: 0 16px 44px rgba(0, 0, 0, 0.12);
            margin-bottom: 20px;
            user-select: none;
        }

        .digit {
            display: inline-block;
            transform-origin: 50% 100%;
            will-change: transform;
            cursor: default;
        }

        .lost-hero h1 {
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 800;
            color: var(--white);
            margin-bottom: 14px;
        }

        .lost-hero .subtitle {
            color: var(--white);
            font-size: 1.15rem;
            opacity: 0.95;
            max-width: 460px;
            margin: 0 auto 36px;
        }

        .actions {
            display: flex;
            justify-content: center;
            gap: 14px;
            flex-wrap: wrap;
        }

        .btn-404 {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            will-change: transform;
            /* transform stays GSAP-owned (magnetic hover) — only paint props here */
            transition: background-color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                color 0.3s cubic-bezier(0.4, 0, 0.2, 1),
                box-shadow 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn-404.primary {
            background: var(--white);
            color: var(--secondary);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
        }

        .btn-404.primary:hover {
            background: var(--secondary);
            color: var(--white);
            box-shadow: 0 16px 36px rgba(0, 0, 0, 0.22);
        }

        .btn-404.ghost {
            background: rgba(255, 255, 255, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            color: var(--white);
        }

        .btn-404.ghost:hover {
            background: var(--white);
            color: var(--secondary);
        }

        .btn-404:focus-visible {
            outline: 3px solid rgba(255, 255, 255, 0.85);
            outline-offset: 3px;
        }

        /* --- Scene (road, bus, clouds, sign) --- */
        .scene {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 210px;
            z-index: 1;
            pointer-events: none;
        }

        .cloud {
            position: absolute;
            width: 110px;
            height: 32px;
            background: rgba(255, 255, 255, 0.38);
            border-radius: 40px;
        }

        .cloud::before {
            content: "";
            position: absolute;
            width: 46px;
            height: 46px;
            background: inherit;
            border-radius: 50%;
            top: -20px;
            left: 18px;
        }

        .cloud::after {
            content: "";
            position: absolute;
            width: 32px;
            height: 32px;
            background: inherit;
            border-radius: 50%;
            top: -13px;
            right: 20px;
        }

        .c1 { top: -330px; left: 7%; }
        .c2 { top: -260px; right: 9%; opacity: 0.75; }
        .c3 { top: -400px; right: 28%; opacity: 0.55; }

        .road {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 18px;
            background: var(--secondary);
            overflow: hidden;
        }

        .dashes {
            position: absolute;
            top: 50%;
            left: 0;
            height: 3px;
            width: calc(100% + 104px);
            transform: translateY(-50%);
            background: repeating-linear-gradient(90deg,
                    rgba(255, 255, 255, 0.85) 0 26px,
                    transparent 26px 52px);
        }

        .bus {
            position: absolute;
            bottom: 13px;
            left: 50%;
            transform: translateX(-56%);
            width: min(280px, 64vw);
            pointer-events: auto;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .bus svg {
            display: block;
            width: 100%;
            height: auto;
        }

        .honk {
            position: absolute;
            top: -30px;
            right: 4%;
            background: var(--white);
            color: var(--secondary);
            font-family: 'Open Runde', 'Inter', sans-serif;
            font-weight: 800;
            font-size: 0.85rem;
            padding: 7px 14px;
            border-radius: 14px 14px 14px 4px;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.16);
            transform: scale(0);
            opacity: 0;
            visibility: hidden;
            white-space: nowrap;
        }

        .puff {
            position: absolute;
            left: -4px;
            bottom: 26px;
            width: 13px;
            height: 13px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            opacity: 0;
        }

        .stop-sign {
            position: absolute;
            bottom: 16px;
            right: 8%;
            width: 58px;
            transform-origin: 50% 100%;
            pointer-events: auto;
        }

        .stop-sign svg {
            display: block;
            width: 100%;
            height: auto;
        }

        /* --- Footer --- */
        footer {
            background: #111;
            color: #888;
            padding: 32px 0;
            text-align: center;
            font-size: 0.9rem;
        }

        /* --- Responsive --- */
        @media (max-width: 640px) {
            .lost-hero {
                padding: 120px 0 200px;
            }

            .scene {
                height: 180px;
            }

            .stop-sign {
                width: 44px;
                right: 3%;
            }

            .c1 { top: -300px; }
            .c2 { top: -240px; }
            .c3 { display: none; }
        }

        /* --- Reduced motion: static scene, everything readable --- */
        @media (prefers-reduced-motion: reduce) {
            .puff,
            .honk {
                display: none;
            }
        }
    </style>
</head>

                            <circle cx="184" cy="83.5" r="2" fill="#9CD36E" />
                        </g>
                    </svg>

                <div class="road">
                    <div class="dashes"></div>

            </div>

        <div class="container">
            &copy; 2026 Urbanfolks Mobility. Your easy way around.
        </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script>
        if (window.untitledUI) untitledUI.createIcons();
    </script>
    <script>
        // Micro-interactions (GSAP). The page is fully readable without JS:
        // animations use gsap.from()/loops only, so a failed CDN load or
        // prefers-reduced-motion leaves clean static content.
        (function () {
            if (!window.gsap) return;
            if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

            var fine = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

            // --- Intro ---
            gsap.timeline({ defaults: { ease: 'power3.out' } })
                .from('.section-tag', { y: -24, autoAlpha: 0, duration: 0.5 })
                .from('.digit', {
                    y: -90,
                    autoAlpha: 0,
                    rotation: function (i) { return i === 1 ? 0 : (i === 0 ? -8 : 8); },
                    stagger: 0.09,
                    duration: 0.7,
                    ease: 'back.out(1.6)'
                }, '-=0.2')
                .from('.lost-hero h1', { y: 26, autoAlpha: 0, duration: 0.55 }, '-=0.25')
                .from('.lost-hero .subtitle', { y: 22, autoAlpha: 0, duration: 0.5 }, '-=0.35')
                .from('.actions .btn-404', { y: 18, autoAlpha: 0, stagger: 0.08, duration: 0.45 }, '-=0.3')
                .from('.scene', { y: 30, autoAlpha: 0, duration: 0.6 }, '-=0.35');

            // --- Ambient loops ---
            gsap.to('.wheel', { rotation: 360, transformOrigin: '50% 50%', repeat: -1, duration: 1.15, ease: 'none' });
            gsap.to('#busBody', { y: -2.5, yoyo: true, repeat: -1, duration: 0.45, ease: 'sine.inOut' });
            gsap.to('.dashes', { x: -52, repeat: -1, duration: 0.55, ease: 'none' });
            gsap.to('#stopSign', { rotation: 2.5, transformOrigin: '50% 100%', yoyo: true, repeat: -1, duration: 2.2, ease: 'sine.inOut' });

            gsap.utils.toArray('.cloud').forEach(function (c, i) {
                gsap.to(c, { x: i % 2 ? -26 : 26, yoyo: true, repeat: -1, duration: 5 + i * 1.7, ease: 'sine.inOut' });
            });

            gsap.utils.toArray('.puff').forEach(function (p, i) {
                gsap.to(p, {
                    keyframes: [
                        { autoAlpha: 0.7, scale: 0.9, x: -8, y: -4, duration: 0.35 },
                        { autoAlpha: 0, scale: 1.6, x: -36, y: -20, duration: 1.15, ease: 'power1.out' }
                    ],
                    repeat: -1,
                    repeatDelay: 0.1,
                    delay: i * 0.5
                });
            });

            // --- Digit jelly on hover/touch ---
            gsap.utils.toArray('.digit').forEach(function (d) {
                d.addEventListener('pointerenter', function () {
                    gsap.fromTo(d, { scaleY: 0.72, scaleX: 1.22 },
                        { scaleY: 1, scaleX: 1, duration: 0.9, ease: 'elastic.out(1.1, 0.4)' });
                });
            });

            // --- Honk: tap the bus ---
            var honking = false;
            document.getElementById('bus').addEventListener('click', function () {
                if (honking) return;
                honking = true;
                gsap.timeline({ onComplete: function () { honking = false; } })
                    .to('#busBody', { scaleY: 0.88, scaleX: 1.05, transformOrigin: '50% 100%', duration: 0.12, ease: 'power2.out' })
                    .to('#busBody', { scaleY: 1, scaleX: 1, duration: 0.7, ease: 'elastic.out(1, 0.35)' })
                    .fromTo('#honk', { scale: 0, autoAlpha: 0, y: 0 },
                        { scale: 1, autoAlpha: 1, duration: 0.3, ease: 'back.out(2.5)' }, 0)
                    .to('#honk', { autoAlpha: 0, y: -12, duration: 0.35 }, 0.85);
            });

            // --- Desktop only: magnetic buttons + pointer parallax ---
            if (fine) {
                gsap.utils.toArray('.btn-404').forEach(function (btn) {
                    var xTo = gsap.quickTo(btn, 'x', { duration: 0.35, ease: 'power3' });
                    var yTo = gsap.quickTo(btn, 'y', { duration: 0.35, ease: 'power3' });
                    btn.addEventListener('pointermove', function (e) {
                        var r = btn.getBoundingClientRect();
                        xTo((e.clientX - (r.left + r.width / 2)) * 0.22);
                        yTo((e.clientY - (r.top + r.height / 2)) * 0.3);
                    });
                    btn.addEventListener('pointerleave', function () { xTo(0); yTo(0); });
                });

                var layers = [
                    { to: gsap.quickTo('.code-404', 'x', { duration: 0.6, ease: 'power3' }), depth: 8 },
                    { to: gsap.quickTo('.c1', 'y', { duration: 0.8, ease: 'power3' }), depth: 14 },
                    { to: gsap.quickTo('.c2', 'y', { duration: 0.8, ease: 'power3' }), depth: 22 },
                    { to: gsap.quickTo('.c3', 'y', { duration: 0.8, ease: 'power3' }), depth: 10 }
                ];
                document.querySelector('.lost-hero').addEventListener('pointermove', function (e) {
                    var nx = (e.clientX / window.innerWidth) * 2 - 1;
                    var ny = (e.clientY / window.innerHeight) * 2 - 1;
                    layers[0].to(nx * layers[0].depth);
                    layers[1].to(ny * layers[1].depth);
                    layers[2].to(ny * layers[2].depth);
                    layers[3].to(ny * layers[3].depth);
                });

                var sign = document.getElementById('stopSign');
                sign.addEventListener('pointerenter', function () {
                    gsap.fromTo(sign, { rotation: -7 }, { rotation: 0, duration: 1.1, ease: 'elastic.out(1.2, 0.3)' });
                });
            }
        })();
    </script>
</body>

</html>
